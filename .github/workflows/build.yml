name: Build

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    # Skip for the template repository itself
    if: github.repository != 'forketyfork/obsidian-plugin-template'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24.x"
          cache: "pnpm"
      - name: Build plugin
        run: |
          pnpm install --frozen-lockfile
          pnpm build
      - name: Fail if build modified files
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Build modified files. Commit the output of 'pnpm build'."
            git status --porcelain
            exit 1
          fi
